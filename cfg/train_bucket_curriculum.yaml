seed: 0

num_envs: 512
board_size: 15
device: cuda
out_device: cuda
run_dir:
version_name: bucket-curriculum-temporal6-block8
augment: false

# This value is overwritten when override_epochs_from_curriculum=true.
epochs: 1
steps: 128
save_interval: 300
log_interval: 10

# Used only for checkpoint/model/Elo naming and LR/entropy schedule continuation.
# It does not control which curriculum bucket is used; use curriculum_epoch_offset for that.
pretrain_epoch_offset: 2700
curriculum_epoch_offset: 0

# Optional starting checkpoint for the current trainable black/white policies.
black_checkpoint: wandb/run-20260508_001742-t4iot4cl/files/black_02700.pt
white_checkpoint: wandb/run-20260508_001742-t4iot4cl/files/white_02700.pt

# Action pruning settings.
action_pruning:
  enabled: true

# Observation settings. Must match the checkpoint architecture.
use_temporal_feature: true
temporal_num_steps: 6

# ---------------------------------------------------------------------------
# Ordered historical-bucket curriculum.
# ---------------------------------------------------------------------------
# f/e point to the OLD training model pool generated by previous PSRO/self-play runs.
# The pool is role-separated: black_entries teach current white; white_entries teach current black.
f: train_model_pool_psro-temporal6-block4-psro-bucket
e: wandb/run-20260508_001742-t4iot4cl/files/pool_meta_02700.json

# Consecutive metadata entries are grouped as:
# bucket 0 = entries[0:bucket_size], bucket 1 = entries[bucket_size:2*bucket_size], ...
bucket_size: 20

# Train on each bucket for this many outer epochs before moving to the next bucket.
epochs_per_bucket: 40

# Number of full passes over selected buckets. Total epochs are:
# curriculum_cycles * (end_bucket - start_bucket) * epochs_per_bucket
curriculum_cycles: 2

# Select a contiguous bucket range [start_bucket, end_bucket). Null end means all available buckets.
start_bucket: 12
end_bucket: 

# Which current roles to update:
#   both       -> current black vs historical white bucket, and current white vs historical black bucket
#   black      -> only current black learns from historical white bucket
#   white      -> only current white learns from historical black bucket
# black_only / white_only are also accepted.
train_roles: both

# Within the selected bucket, sample a teacher checkpoint by either:
#   softmax_quality -> softmax over each model's existing quality/q score
#   uniform         -> uniform over models in the bucket
sample_within_bucket: softmax_quality

# Usually true: ignore cfg.epochs and compute it from curriculum_cycles * buckets * epochs_per_bucket.
override_epochs_from_curriculum: true

# Usually false: the old teacher pool is fixed and will not be mutated.
# If true, the old PSRO quality update is applied to the sampled teacher model.
update_teacher_quality: false
l: 0.2

# If no complete bucket exists, false raises an error instead of silently doing self-play.
allow_self_play_fallback: false

# Balance control. For curriculum, default false is cleaner.
# If train_roles=both and enabled=true, this alternates white_only -> both -> white_only -> both.
balance:
  enabled: false

# Training-time Elo model pool.
elo_models: elo_eval_model_pool_bucket_curriculum
elo_e:
elo_interval: 200
elo_eval_repeats: 1
elo_base: 1200.0
elo_scale: 400.0
elo_mle_iters: 1000
elo_mle_lr: 0.05
elo_mle_patience: 100
elo_l2: 0.0001

wandb:
  name: ${version_name}
  group: ${board_size}_${board_size}_${algo.name}_BUCKET_CURRICULUM
  project: gomoku_rl
  mode: online

defaults:
  - _self_
  - algo: ppo
