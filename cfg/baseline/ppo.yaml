name: ppo

# ppo
ppo_epochs: 3
clip_param: 0.2 # 0.2
entropy_coef: 0.001 # 0.01
gae_lambda: 0.95
gamma: 0.99 # 0.99
max_grad_norm: 0.5
batch_size: 4096

normalize_advantage: true
average_gae: False

share_network: True

optimizer:
  name: adam
  kwargs:
    lr: 3e-4


num_channels: 64
num_residual_blocks: 4

# baseline 也可以单独控制是否吃 move-onehot 时序特征
# 如果为 false，则 baseline 仍吃原版 3 通道 [当前方, 对手方, 最近一步]
use_temporal_feature: false
# 只有 use_temporal_feature=true 时才生效
temporal_num_steps: 6

