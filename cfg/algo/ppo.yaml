# Role-split PPO config without common inheritance.
#
# Top-level fields form a normal flat PPO config for inference, Elo, and
# backward compatibility. ``black`` and ``white`` are complete independent PPO
# configs used by gomoku_rl/runner/base.py for training the two roles.
name: ppo
ppo_epochs: 1 # 3
clip_param: 0.2 # 0.2
entropy_coef: 0.01 # 0.01
gae_lambda: 0.95
gamma: 0.99 # 0.99
max_grad_norm: 0.5
batch_size: 4096 # 4096
normalize_advantage: true
average_gae: false
share_network: true

num_channels: 64
num_residual_blocks: 8

use_critic_clip: true
critic_clip_param: 0.2
critic_loss_type: smooth_l1
critic_coef: 1.0
use_dual_clip: true
dual_clip_coef: 3.0

optimizer:
  name: adam
  kwargs:
    lr: 1e-4

lr_decay_mode: constant
lr_start: 1e-4
lr_end: 1e-5
lr_epochs: 5000
entropy_decay_mode: constant
entropy_start: 0.01
entropy_end: 0.001
entropy_epochs: 5000

noise_scale:
  enabled: true
  interval: 192
  warmup_updates: 0
  ema_beta: 0.95
  min_half_batch: 2
  eps: 1e-12
  isolation: shadow_model
  empty_cuda_cache_after_measure: false

