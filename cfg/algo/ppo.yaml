# Role-split PPO config.
#
# ``common`` is shared by black and white. ``black`` and ``white`` inherit all
# common values in gomoku_rl/runner/base.py and may override any PPO parameter.
# This keeps old defaults unchanged while allowing independent black/white PPO
# hyperparameters.
name: ppo

common:
  name: ppo # ppo
  ppo_epochs: 1 # 3
  gae_lambda: 0.95
  gamma: 0.99 # 0.99
  max_grad_norm: 0.5
  batch_size: 4096 # 4096
  normalize_advantage: true
  average_gae: false
  share_network: true

  num_channels: 64
  num_residual_blocks: 8

  noise_scale:
    enabled: true
    interval: 192
    warmup_updates: 0
    ema_beta: 0.95
    min_half_batch: 2
    eps: 1e-12
    isolation: shadow_model
    empty_cuda_cache_after_measure: false

# Black policy PPO overrides. If you do not override a field here, it uses common.*.
black:
  role: black
  clip_param: 0.2 
  entropy_coef: 0.01 
  use_critic_clip: true
  critic_clip_param: 0.2
  critic_loss_type: smooth_l1
  critic_coef: 1.0
  use_dual_clip: true
  dual_clip_coef: 3.0
  optimizer:
    name: adam
    kwargs:
      lr: 1e-4
  lr_decay_mode: constant
  lr_start: 1e-4
  lr_end: 1e-5
  lr_epochs: 5000
  entropy_decay_mode: constant
  entropy_start: 0.01
  entropy_end: 0.001
  entropy_epochs: 5000


# White policy PPO overrides. If you do not override a field here, it uses common.*.
white:
  role: white
  clip_param: 0.15 
  entropy_coef: 0.02
  use_critic_clip: true
  critic_clip_param: 0.15
  critic_loss_type: smooth_l1
  critic_coef: 1.0
  use_dual_clip: true
  dual_clip_coef: 3.0
  optimizer:
    name: adam
    kwargs:
      lr: 5e-5
  lr_decay_mode: constant
  lr_start: 1e-4
  lr_end: 1e-5
  lr_epochs: 5000
  entropy_decay_mode: constant
  entropy_start: 0.01
  entropy_end: 0.001
  entropy_epochs: 5000

