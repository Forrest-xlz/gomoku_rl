seed: 0
num_envs: 512
board_size: 15
device: cuda
out_device: cpu

run_dir:
version_name: inrl-temporal-6

augment: false

epochs: 1000
steps: 128
save_interval: 300
log_interval: 5

black_checkpoint: wandb\run-20260417_024131-4te2g3if\files\black_2700.pt
white_checkpoint: wandb\run-20260417_024131-4te2g3if\files\white_2700.pt

# action pruning settings
action_pruning:
  enabled: true

# 新增：是否启用“当前局面 + 前 n 手 one-hot 落点图”
use_temporal_feature: true
# n 的含义：保留最近 n 手落点，每手一个 one-hot 平面
# 开启后总通道数 = 2 + temporal_num_steps
# 其中前 2 层是 [当前执子方棋子平面, 对手棋子平面]
temporal_num_steps: 6

# eval baseline 池：
# - black_pool 里的模型会作为黑方 baseline，去和当前 white 对打；
# - white_pool 里的模型会作为白方 baseline，去和当前 black 对打；
# - 日志命名为 baseline1、baseline2...（按列表顺序，1-based）。
#
# 例子：
# eval_baseline_pool:
#   black_pool:
#     - D:\gomoku_ckpts\black_a.pt
#     - D:\gomoku_ckpts\black_b.pt
#   white_pool:
#     - D:\gomoku_ckpts\white_a.pt
#     - D:\gomoku_ckpts\white_b.pt
eval_baseline_pool:
  black_pool: [pretrained_models\15_15\ppo\0.pt, wandb\run-20260411_070144-l2znhhtp\files\black_final.pt]
  white_pool: [pretrained_models\15_15\ppo\0.pt, wandb\run-20260411_070144-l2znhhtp\files\white_final.pt]

# 新的双网络平衡控制。
# 语义：
# - 保留每 log_interval 个 epoch 做一次 black vs white 评估；
# - raw eval/black_vs_white 保持原样；
# - 对 raw 值做 EMA，得到 eval/black_vs_white_ema；
# - 若 EMA > upper，则“下一次 rollout 只更新 white”；
# - 若 EMA < lower，则“下一次 rollout 只更新 black”；
# - 该单边更新只持续 1 个 rollout，之后自动恢复双边同时更新。
balance:
  enabled: true
  lower: 0.3
  upper: 0.7
  ema_alpha: 0.33

wandb:
  name: ${version_name}
  group: ${board_size}_${board_size}_${algo.name}_InRL
  project: gomoku_rl
  mode: online # set to 'disabled' when debugging locally

defaults:
  - _self_
  - algo: ppo
  - baseline: ppo
