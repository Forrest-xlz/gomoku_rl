seed: 0

num_envs: 512
board_size: 15
device: cuda
out_device: cpu
run_dir:

version_name: original - no - pretraining - v0

augment: false

epochs: 1000
steps: 128
save_interval: 300
log_interval: 5

#black_checkpoint: pretrained_models/${board_size}_${board_size}/${algo.name}/0.pt
#white_checkpoint: pretrained_models/${board_size}_${board_size}/${algo.name}/1.pt

gate:
  enabled: true
  interval: 10  # number of epochs between gate evaluations
  warmup_epochs: 0  # number of epochs to wait before enabling the gate
  eval_n: 3 # number of evaluation games to play for gate decision
  accept_margin: 0.05
  collapse_margin: 0.1

wandb:
  name: ${version_name}
  group: ${board_size}_${board_size}_${algo.name}_InRL
  project: gomoku_rl
  mode: online # set to 'disabled' when debugging locally

defaults:
  - _self_
  - algo: ppo
  - baseline: ppo