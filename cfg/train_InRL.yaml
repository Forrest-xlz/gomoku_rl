seed: 0
num_envs: 512
board_size: 15
device: cuda
out_device: cpu
run_dir:
version_name: inrl-temporal-6
augment: false

epochs: 10000
steps: 128
save_interval: 300
log_interval: 5

# If training resumes from pretrained checkpoints, set this to the global epoch
# represented by those checkpoints. Example: checkpoint is black_01000.pt and
# white_01000.pt -> pretrain_epoch_offset: 1000. After another 100 epochs,
# the saved checkpoint becomes black_01100.pt / white_01100.pt.
pretrain_epoch_offset: 0
black_checkpoint:
white_checkpoint:

# Action pruning settings.
action_pruning:
  enabled: true

# Observation settings.
# temporal_move_history total channels = 2 + temporal_num_steps.
use_temporal_feature: true
temporal_num_steps: 6


# Training-time Elo model pool. Same mechanism as PSRO.
# - elo_models stores checkpoint files.
# - elo_e / elo_meta stores model entries + payoff matrix.
# - If metadata is empty, the starting current model is registered once.
# - If metadata is non-empty, the starting checkpoint is not auto-added.
elo_models: elo_models
elo_e:
elo_interval: 300
elo_eval_repeats: 1
elo_base: 1200.0
elo_scale: 400.0
elo_mle_iters: 1000
elo_mle_lr: 0.05
elo_mle_patience: 100
elo_l2: 0.0001

# Black/white balance control.
balance:
  enabled: true
  lower: 0.3
  upper: 0.7
  ema_alpha: 0.33

wandb:
  name: ${version_name}
  group: ${board_size}_${board_size}_${algo.name}_InRL
  project: gomoku_rl
  mode: online

defaults:
  - _self_
  - algo: ppo
