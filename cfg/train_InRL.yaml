seed: 0
num_envs: 512
board_size: 15
device: cuda
out_device: cpu

run_dir:
version_name: inrl-balance-ema-v1

augment: false

epochs: 2000
steps: 128
save_interval: 300
log_interval: 5

black_checkpoint: wandb\run-20260409_071329-66odiox9\files\black_final.pt
white_checkpoint: wandb\run-20260409_071329-66odiox9\files\white_final.pt

# action pruning settings
action_pruning:
  enabled: true

# 新的双网络平衡控制。
# 语义：
# - 保留每 log_interval 个 epoch 做一次 black vs white 评估；
# - raw eval/black_vs_white 保持原样；
# - 对 raw 值做 EMA，得到 eval/black_vs_white_ema；
# - 若 EMA > upper，则“下一次 rollout 只更新 white”；
# - 若 EMA < lower，则“下一次 rollout 只更新 black”；
# - 该单边更新只持续 1 个 rollout，之后自动恢复双边同时更新。
balance:
  enabled: true
  lower: 0.35
  upper: 0.65
  ema_alpha: 0.33

wandb:
  name: ${version_name}
  group: ${board_size}_${board_size}_${algo.name}_InRL
  project: gomoku_rl
  mode: online # set to 'disabled' when debugging locally

defaults:
  - _self_
  - algo: ppo
  - baseline: ppo
