seed: 0
num_envs: 1024  
board_size: 15
device: cuda
out_device: cuda
run_dir:
version_name: psro-temporal6-block8-epoch1-numenvs1024
augment: false

epochs: 20000
steps: 128
save_interval: 300
log_interval: 10

# Resume offset for checkpoint/model-pool/Elo names.
# Example: pretrain_epoch_offset=1000 and save_interval=100 -> black_01100.pt.
pretrain_epoch_offset: 0
black_checkpoint:
white_checkpoint:

# Action pruning settings.
action_pruning:
  enabled: true

# Observation settings.
use_temporal_feature: true
temporal_num_steps: 6


# Dota/OpenAI-Five-style historical policy-pool self-play.
# p: probability of current_black vs current_white self-play.
# l: quality-score learning rate for sampled historical opponents.
# m: add current black/white to training pool every m epochs.
p: 0.8
l: 0.2
m: 10

# Training model pool.
# f stores checkpoint files. e stores metadata. If e is empty/missing, a new
# pool_meta.json is created under f.
f: train_model_pool_test
e: 

# Training-time Elo model pool.
# elo_models stores checkpoint files. elo_e stores entries + payoff.
# If elo_e points to existing metadata, current start checkpoint is not added.
elo_models: elo_eval_model_pool_test
elo_e:
elo_interval: 200
elo_eval_repeats: 1
elo_base: 1200.0
elo_scale: 400.0
elo_mle_iters: 1000
elo_mle_lr: 0.05
elo_mle_patience: 100
elo_l2: 0.0001

# Black/white balance control.
balance:
  enabled: false
  lower: 0.3
  upper: 0.7
  ema_alpha: 0.33

wandb:
  name: ${version_name}
  group: ${board_size}_${board_size}_${algo.name}_PSRO
  project: gomoku_rl
  mode: online

defaults:
  - _self_
  - algo: ppo
