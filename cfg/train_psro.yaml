seed: 0
num_envs: 512
board_size: 15
device: cuda
out_device: cpu
run_dir:
augment: false
epochs: 2000
steps: 128
save_interval: 250
version_name: psro - active-archive - base

# psro
meta_solver: uniform
population_interaction_type: random
mean_threshold: 0.99
std_threshold: 0.005
min_iter_steps: 1
max_iter_steps: 5
max_size: 1

# active / archive management
mid_low: 0.3
mid_high: 0.7
active_min: 5
protect_latest: 2
archive_max: 10

# black_checkpoint: pretrained_models/${board_size}_${board_size}/${algo.name}/0.pt
# white_checkpoint: pretrained_models/${board_size}_${board_size}/${algo.name}/1.pt

wandb:
  name: ${version_name}
  group: ${board_size}_${board_size}
  project: gomoku_rl
  mode: online

defaults:
  - _self_
  - algo: ppo
  - baseline: ppo
