seed: 0
num_envs: 1536
board_size: 15
device: cuda
out_device: cuda
run_dir:
version_name: psro-temporal6-block4-psro-bucket-review
augment: false

epochs: 20000
steps: 128
save_interval: 300
log_interval: 10

# Resume offset for checkpoint/model-pool/Elo names.
# Example: pretrain_epoch_offset=1000 and save_interval=100 -> black_01100.pt.
pretrain_epoch_offset: 5700
black_checkpoint: wandb/run-20260509_074553-6jm3i4gb/files/black_06300.pt
white_checkpoint: wandb/run-20260509_074553-6jm3i4gb/files/white_06300.pt

# Action pruning settings.
action_pruning:
  enabled: true

# Observation settings.
use_temporal_feature: true
temporal_num_steps: 6

# Dota/OpenAI-Five-style historical policy-pool self-play.
self_play_phase_epochs: 160
bucket_phase_epochs: 40
bucket_size: 20
l: 0.4
m: 10

# Black/white balance control for PSRO.
# If enabled, the runner directly alternates update modes:
#   white_only -> both -> white_only -> both -> ...
# No win-rate EMA, lower bound, or upper bound is used.
balance:
  enabled: false

# Training model pool.
# f stores checkpoint files. e stores metadata. If e is empty/missing, a new
# pool_meta.json is created under f.
f: train_model_pool_psro-temporal6-block4-psro-bucket
e: wandb/run-20260509_074553-6jm3i4gb/files/pool_meta_06300.json

# Training-time Elo model pool.
# elo_models stores checkpoint files. elo_e stores entries + payoff.
# If elo_e points to existing metadata, current start checkpoint is not added.
elo_models: elo_eval_model_pool_psro-temporal6-block4-psro-bucket
elo_e: wandb/run-20260509_074553-6jm3i4gb/files/elo_meta_06300.json
elo_interval: 201
elo_eval_repeats: 1
elo_base: 1200.0
elo_scale: 400.0
elo_mle_iters: 1000
elo_mle_lr: 0.05
elo_mle_patience: 100
elo_l2: 0.0001

# Post-Elo review: triggered separately for black/white when current role Elo
# is lower than every one of the previous N Elo-evaluated models.
elo_review:
  enabled: true
  window: 3              # N: compare against previous N Elo-evaluated models
  min_prior: 4           # skip until there are at least this many prior Elo models
  compare_stat: mean # min | mean | max
  front_buckets: 3       # review buckets = first N buckets + best-Elo bucket if not already included
  epochs: 2              # number of mixed-bucket review PPO updates before re-Elo
  policy_name: ppo_review
  accept_margin: 0.0     # accept only if reviewed role Elo > pre-review role Elo + margin
  best_bucket_source: opponent  # teacher buckets come from opponent-role pool; maps best Elo epoch to that pool

  # CPU-memory rollout storage, then GPU minibatch PPO.
  base_env_num: 256
  min_envs_per_teacher: 50
  max_envs_per_teacher: 1000
  env_rounding: round
  teacher_prob_temperature: 1.0
  teacher_chunk_size: 8
  collector_out_device: cpu
  rollout_storage_device: cpu
  shuffle_rollout_before_ppo: true
  rollout_shuffle_mode: env
  keep_rejected_elo_entry: false

wandb:
  name: ${version_name}
  group: ${board_size}_${board_size}_${algo.name}_PSRO
  project: gomoku_rl
  mode: online

defaults:
  - _self_
  - algo: ppo
