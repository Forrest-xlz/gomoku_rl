    black_checkpoint: /root/autodl-tmp/gomoku_rl/train_model_pool/black/black_00100.pt
    white_checkpoint: /root/autodl-tmp/gomoku_rl/train_model_pool/white/white_00100.pt
    temporal: 6
    num_channels: 64
    num_residual_blocks: 4

  - name: epoch_00200
    black_checkpoint: /root/autodl-tmp/gomoku_rl/train_model_pool/black/black_00200.pt
    white_checkpoint: /root/autodl-tmp/gomoku_rl/train_model_pool/white/white_00200.pt
    temporal: 6
    num_channels: 64
    num_residual_blocks: 4