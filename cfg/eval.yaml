seed: 0
board_size: 15
num_envs: 512
num_repeats: 2
device: cuda

interaction: random

defaults:
  - _self_
  - algo: ppo

output_dir: eval_outputs
resume: true
cache_size: 4

average_rating: 1200
elo_l2: 1.0e-4
elo_max_iter: 5000
elo_patience: 100
elo_lr: 0.05
elo_min_delta: 1.0e-10

h:
